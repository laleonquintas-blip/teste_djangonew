<div class="cfb-wrap">
    <div class="cfb-title">Filtros</div>
    <div class="cfb-row">

        <div class="cfb-field" style="flex:1;min-width:140px;">
            <label>Nº da Nota</label>
            <input type="text" id="cfb_nota" data-cfb-param="nota_q" placeholder="Ex: CP-00012">
        </div>

        <div class="cfb-field" style="flex:2;min-width:200px;">
            <label>Fornecedor</label>
            <input type="text" id="cfb_forn" data-cfb-param="forn_q" placeholder="Nome do fornecedor...">
        </div>

        <div class="cfb-field cfb-date-range" style="flex:2;min-width:260px;">
            <div class="cfb-sub">
                <label>Vencimento De</label>
                <input type="date" id="cfb_venc_ini" data-cfb-param="vencimento__range__gte">
            </div>
            <span class="cfb-sep">até</span>
            <div class="cfb-sub"><label>&nbsp;</label>
                <input type="date" id="cfb_venc_fim" data-cfb-param="vencimento__range__lte">
            </div>
        </div>

        <div class="cfb-field cfb-date-range" style="flex:2;min-width:260px;">
            <div class="cfb-sub">
                <label>Data Baixa De</label>
                <input type="date" id="cfb_baixa_ini" data-cfb-param="data_baixa__range__gte">
            </div>
            <span class="cfb-sep">até</span>
            <div class="cfb-sub"><label>&nbsp;</label>
                <input type="date" id="cfb_baixa_fim" data-cfb-param="data_baixa__range__lte">
            </div>
        </div>

        <div class="cfb-field" style="min-width:140px;">
            <label>Situação</label>
            <select id="cfb_status" data-cfb-param="status_real">
                <option value="">— Todas —</option>
                <option value="A_VENCER">A Vencer</option>
                <option value="VENCIDO">Vencido</option>
                <option value="PAGO">Pago</option>
                <option value="CANCELADO">Cancelado</option>
            </select>
        </div>

        <div class="cfb-field" style="min-width:160px;">
            <label>Empresa Pagadora</label>
            <select id="cfb_empresa" data-cfb-param="empresa_pagadora">
                <option value="">— Todas —</option>
                {% for eid, enome in empresas_opts %}
                <option value="{{ eid }}">{{ enome }}</option>
                {% endfor %}
            </select>
        </div>

    </div>
    <div class="cfb-actions" style="margin-top:10px;">
        <button type="button" class="cfb-btn cfb-btn-search" onclick="cfbApply({
            nota_q: cfbVal('cfb_nota'),
            forn_q: cfbVal('cfb_forn'),
            'vencimento__range__gte': cfbVal('cfb_venc_ini'),
            'vencimento__range__lte': cfbVal('cfb_venc_fim'),
            'data_baixa__range__gte': cfbVal('cfb_baixa_ini'),
            'data_baixa__range__lte': cfbVal('cfb_baixa_fim'),
            status_real: cfbVal('cfb_status'),
            empresa_pagadora: cfbVal('cfb_empresa')
        })">🔍 Pesquisar</button>
        <button type="button" class="cfb-btn cfb-btn-clear" onclick="cfbClear()">✕ Limpar</button>
    </div>
</div>
